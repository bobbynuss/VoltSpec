<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#38bdf8" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- V shape - circuit board style -->
  <g filter="url(#glow)">
    <!-- Left arm of V -->
    <path d="M120 60 L60 60 L220 440 L256 440 L130 130" fill="#0f172a" stroke="#1e293b" stroke-width="4"/>
    <!-- Right arm of V -->
    <path d="M380 60 L452 60 L290 440 L256 440 L390 130" fill="#0f172a" stroke="#1e293b" stroke-width="4"/>

    <!-- Circuit traces - left -->
    <line x1="80" y1="60" x2="80" y2="160" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="80" y1="160" x2="140" y2="240" stroke="#0ea5e9" stroke-width="3"/>
    <circle cx="80" cy="60" r="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="80" cy="160" r="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="140" cy="240" r="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>

    <!-- Circuit traces - right -->
    <line x1="420" y1="60" x2="420" y2="120" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="420" y1="120" x2="380" y2="120" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="380" y1="120" x2="380" y2="200" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="420" y1="60" x2="450" y2="90" stroke="#0ea5e9" stroke-width="3"/>
    <circle cx="420" cy="60" r="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="380" cy="120" r="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="420" cy="120" r="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="380" cy="200" r="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="450" cy="90" r="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>

  <!-- Lightning bolt -->
  <path d="M300 40 L200 260 L270 260 L220 470 L350 210 L275 210 L300 40Z" fill="url(#boltGrad)"/>
</svg>
