<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0ea5e9" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#facc15" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="vFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2030"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- V shape — clean, thick, symmetric -->
  <g filter="url(#glow)">
    <path d="M72,56 L168,56 L272,440 L256,464 L240,440 L344,56 L440,56 L280,464 L256,496 L232,464 Z"
      fill="url(#vFill)" stroke="#0ea5e9" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Circuit traces — LEFT arm (3 nodes, zigzag along arm surface) -->
  <g filter="url(#glow)">
    <line x1="112" y1="88" x2="100" y2="192" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="192" x2="156" y2="312" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="112" cy="88" r="8" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="100" cy="192" r="6" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="156" cy="312" r="6" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>

  <!-- Circuit traces — RIGHT arm (mirrored: x' = 512 - x) -->
  <g filter="url(#glow)">
    <line x1="400" y1="88" x2="412" y2="192" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="412" y1="192" x2="356" y2="312" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="400" cy="88" r="8" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="412" cy="192" r="6" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="356" cy="312" r="6" fill="#0a1628" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>

  <!-- Lightning bolt — sharp, angular -->
  <g filter="url(#boltGlow)">
    <path d="M304,24 L224,228 L276,228 L216,488 L344,196 L288,196 Z" fill="url(#bolt)"/>
  </g>
</svg>
