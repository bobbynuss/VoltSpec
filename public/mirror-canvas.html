<!DOCTYPE html>
<html>
<head><title>Mirror Logo</title></head>
<body style="background:#222;padding:20px;color:white;font-family:sans-serif">
<h2>VoltSpec Logo Mirror Tool</h2>
<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:start">
  <div><h3>Original</h3><canvas id="c1"></canvas></div>
  <div><h3>Result</h3><canvas id="c2"></canvas></div>
</div>
<div id="status" style="color:#0ea5e9;margin-top:10px"></div>

<script>
const img = new Image();
img.onload = () => {
  const W = img.width, H = img.height;
  const CX = 395; // V center axis

  const c1 = document.getElementById('c1');
  const c2 = document.getElementById('c2');
  c1.width = c2.width = W;
  c1.height = c2.height = H;
  const ctx1 = c1.getContext('2d');
  const ctx2 = c2.getContext('2d');

  // Draw original
  ctx1.drawImage(img, 0, 0);

  // === BUILD RESULT ===
  // Step 1: Draw left half of original (includes left V arm + left part of bolt)
  ctx2.drawImage(img, 0, 0, CX, H, 0, 0, CX, H);

  // Step 2: Draw left half FLIPPED as the right half
  // This gives us a mirrored V arm on the right, but also a mirrored bolt (unwanted)
  ctx2.save();
  ctx2.translate(CX * 2, 0);
  ctx2.scale(-1, 1);
  ctx2.drawImage(img, 0, 0, CX, H, 0, 0, CX, H);
  ctx2.restore();

  // Step 3: Paste back the ORIGINAL bolt zone over the center
  // The bolt roughly spans x=240 to x=530 in the original
  // We need to paste it back precisely — but only the bolt pixels, not the V arm background
  // 
  // Strategy: paste a vertical strip from the original covering the bolt zone.
  // But we only want to paste bolt pixels (yellow), not the surrounding V or background.
  
  const origData = ctx1.getImageData(0, 0, W, H);
  const resultData = ctx2.getImageData(0, 0, W, H);
  const od = origData.data;
  const rd = resultData.data;

  // Paste original bolt pixels (and their immediate glow) over the result
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const r = od[i], g = od[i+1], b = od[i+2];

      // Yellow bolt pixels
      const isYellow = r > 145 && g > 100 && b < 115 && (r - b) > 50;
      // Dark gold edges
      const isDarkGold = r > 100 && g > 60 && b < 50 && (r - b) > 60 && r > g;
      
      if (isYellow || isDarkGold) {
        rd[i] = r;
        rd[i+1] = g;
        rd[i+2] = b;
        rd[i+3] = od[i+3];
      }
    }
  }

  // Now handle the ghost mirrored bolt on the right side:
  // The flipped left half created a reversed bolt on the right.
  // The original bolt pixels have been pasted back, but the ghost bolt's
  // V-arm-colored pixels underneath remain.
  // We need to find pixels on the right side that are part of the ghost bolt
  // (from the flip) and replace them with clean V arm surface.
  //
  // Approach: On the right side (x > CX), find where the FLIPPED bolt was.
  // The flipped bolt's position = CX + (CX - origBoltX), i.e. mirrored.
  // For each row, find bolt pixel x-range on the LEFT side, mirror to get ghost range on RIGHT.
  // In that ghost range, replace with clean V surface from the mirrored arm (sample from outside the ghost zone).

  // Build per-row bolt bounds on left side
  for (let y = 0; y < H; y++) {
    let minBoltX = W, maxBoltX = 0;
    for (let x = 0; x < CX; x++) {
      const i = (y * W + x) * 4;
      const r = od[i], g = od[i+1], b = od[i+2];
      const isB = (r > 145 && g > 100 && b < 115 && (r - b) > 50) ||
                  (r > 100 && g > 60 && b < 50 && (r - b) > 60 && r > g);
      if (isB) {
        minBoltX = Math.min(minBoltX, x);
        maxBoltX = Math.max(maxBoltX, x);
      }
    }
    
    if (maxBoltX < minBoltX) continue; // no bolt on this row's left side

    // Ghost bolt on right side = mirrored positions
    // Left bolt at x -> flipped to CX + (CX - x) = 2*CX - x
    const ghostMin = 2 * CX - maxBoltX;
    const ghostMax = 2 * CX - minBoltX;
    
    // Expand by glow margin
    const MARGIN = 25;
    const cleanMin = Math.max(CX + 1, ghostMin - MARGIN);
    const cleanMax = Math.min(W - 1, ghostMax + MARGIN);

    for (let x = cleanMin; x <= cleanMax; x++) {
      const i = (y * W + x) * 4;
      // Don't overwrite real bolt pixels we just pasted
      const cr = rd[i], cg = rd[i+1], cb = rd[i+2];
      const isRealBolt = (cr > 145 && cg > 100 && cb < 115 && (cr - cb) > 50) ||
                         (cr > 100 && cg > 60 && cb < 50 && (cr - cb) > 60 && cr > cg);
      if (isRealBolt) continue;

      // Replace with what should be here: the mirrored V arm surface
      // Sample from the original RIGHT side at this position (which has the original right arm)
      // But wait — we want the MIRRORED left arm here. So sample the left-side pixel.
      const mirrorX = 2 * CX - x;
      if (mirrorX >= 0 && mirrorX < W) {
        const mi = (y * W + mirrorX) * 4;
        const mr = od[mi], mg = od[mi+1], mb = od[mi+2];
        // Only use if the mirror source is NOT a bolt pixel
        const mIsBolt = (mr > 145 && mg > 100 && mb < 115 && (mr - mb) > 50) ||
                        (mr > 100 && mg > 60 && mb < 50 && (mr - mb) > 60 && mr > mg);
        if (!mIsBolt) {
          rd[i] = mr;
          rd[i+1] = mg;
          rd[i+2] = mb;
        } else {
          // Mirror source IS bolt — use checker bg
          rd[i] = 204; rd[i+1] = 204; rd[i+2] = 204; rd[i+3] = 255;
        }
      }
    }
  }

  ctx2.putImageData(resultData, 0, 0);
  
  document.getElementById('status').textContent = 'Done! Check result.';
  window.__done = true;
  
  // Export as data URL
  window.__resultDataUrl = c2.toDataURL('image/png');
};
img.src = '/voltspec-logo-source.jpg';
</script>
</body>
</html>
