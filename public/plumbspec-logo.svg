<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
  
  <!-- Wrench shape -->
  <g transform="translate(60,60) rotate(-45)">
    <!-- Handle -->
    <rect x="-6" y="-35" width="12" height="45" rx="4" fill="#60a5fa"/>
    <!-- Head -->
    <path d="M-14,10 L-14,28 A14,14 0 0,0 14,28 L14,10 Z" fill="#60a5fa"/>
    <!-- Jaw opening -->
    <rect x="-4" y="18" width="8" height="16" rx="2" fill="#0f172a"/>
  </g>
  
  <!-- Water drop accent -->
  <path d="M85,30 Q85,22 80,28 Q75,34 80,38 A5,5 0 0,0 85,30 Z" fill="#3b82f6" opacity="0.7"/>
</svg>
