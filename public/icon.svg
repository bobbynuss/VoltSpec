<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#0ea5e9" flood-opacity="0.65"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow2" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#facc15" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bolt2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- V shape — separated arms with gap for bolt -->
  <g filter="url(#glow2)">
    <!-- Left arm -->
    <polygon points="64,48 164,48 252,424 212,424" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Right arm -->
    <polygon points="448,48 348,48 260,424 300,424" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Circuit traces — left (built into the V arm like PCB traces) -->
  <g opacity="0.9">
    <!-- Horizontal trace near top of left arm -->
    <line x1="80" y1="80" x2="148" y2="80" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <!-- Diagonal trace down -->
    <line x1="148" y1="80" x2="120" y2="180" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <!-- Another segment -->
    <line x1="120" y1="180" x2="160" y2="280" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <!-- Nodes -->
    <circle cx="80" cy="80" r="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="148" cy="80" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="120" cy="180" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="160" cy="280" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
  </g>

  <!-- Circuit traces — right (mirrored) -->
  <g opacity="0.9">
    <line x1="432" y1="80" x2="364" y2="80" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <line x1="364" y1="80" x2="392" y2="180" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <line x1="392" y1="180" x2="352" y2="280" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <circle cx="432" cy="80" r="6" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="364" cy="80" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="392" cy="180" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="352" cy="280" r="5" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="2"/>
  </g>

  <!-- Lightning bolt — cuts between the V arms -->
  <g filter="url(#boltGlow2)">
    <path d="M308,16 L232,224 L280,224 L220,496 L340,192 L288,192 Z" fill="url(#bolt2)"/>
  </g>
</svg>
