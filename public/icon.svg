<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Blue glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#38bdf8" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for traces -->
    <filter id="traceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#0ea5e9" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Lightning bolt gradient -->
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- V shape - two thick arms meeting at bottom center -->
  <!-- Left arm -->
  <polygon points="100,72 148,72 268,432 220,432" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Right arm (mirrored) -->
  <polygon points="412,72 364,72 244,432 292,432" fill="#0f172a" stroke="#1e3a5f" stroke-width="2"/>

  <!-- Circuit traces - LEFT arm -->
  <g filter="url(#traceGlow)">
    <!-- Node 1 (top of left arm) to Node 2 (mid-left, outer edge) -->
    <line x1="112" y1="82" x2="88" y2="190" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Node 2 to Node 3 (lower, angling inward) -->
    <line x1="88" y1="190" x2="160" y2="300" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Nodes (solder pads) -->
    <circle cx="112" cy="82" r="9" fill="#0b1629" stroke="#0ea5e9" stroke-width="3"/>
    <circle cx="88" cy="190" r="7" fill="#0b1629" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="160" cy="300" r="7" fill="#0b1629" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>

  <!-- Circuit traces - RIGHT arm (mirrored from left: x' = 512 - x) -->
  <g filter="url(#traceGlow)">
    <!-- Node 1 (top of right arm) to Node 2 (mid-right, outer edge) -->
    <line x1="400" y1="82" x2="424" y2="190" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Node 2 to Node 3 (lower, angling inward) -->
    <line x1="424" y1="190" x2="352" y2="300" stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Nodes (solder pads) -->
    <circle cx="400" cy="82" r="9" fill="#0b1629" stroke="#0ea5e9" stroke-width="3"/>
    <circle cx="424" cy="190" r="7" fill="#0b1629" stroke="#0ea5e9" stroke-width="2.5"/>
    <circle cx="352" cy="300" r="7" fill="#0b1629" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>

  <!-- Lightning bolt (centered) -->
  <path d="M296 52 L210 256 L268 256 L224 462 L340 220 L278 220 Z" fill="url(#boltGrad)"/>
</svg>
