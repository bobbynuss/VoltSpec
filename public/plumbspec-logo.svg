<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
  
  <!-- Pipe wrench — angled jaw Stillson style, rotated for dynamic look -->
  <g transform="translate(60,62) rotate(-30)">
    <!-- Handle -->
    <rect x="-7" y="2" width="14" height="48" rx="3" fill="#60a5fa"/>
    <!-- Handle grip lines -->
    <line x1="-4" y1="30" x2="4" y2="30" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="35" x2="4" y2="35" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="40" x2="4" y2="40" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Fixed jaw (bottom) -->
    <path d="M-7,2 L-7,-8 Q-7,-14 -2,-16 L8,-16 L8,-8 L-1,-8 L-1,2 Z" fill="#60a5fa"/>
    <!-- Jaw teeth -->
    <line x1="0" y1="-16" x2="0" y2="-12" stroke="#0f172a" stroke-width="1" stroke-linecap="round"/>
    <line x1="4" y1="-16" x2="4" y2="-12" stroke="#0f172a" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Movable jaw (top) - angled open -->
    <path d="M7,2 L7,-6 L12,-6 L14,-16 L8,-16 L8,-8 L7,2 Z" fill="#3b82f6"/>
    <!-- Jaw teeth on movable -->
    <line x1="10" y1="-16" x2="10" y2="-12" stroke="#0f172a" stroke-width="1" stroke-linecap="round"/>
    <line x1="12" y1="-15" x2="12" y2="-11" stroke="#0f172a" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Adjustment nut -->
    <circle cx="3" cy="-2" r="4" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1" y1="-2" x2="5" y2="-2" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Water drop accent -->
  <circle cx="88" cy="28" r="6" fill="#3b82f6" opacity="0.5"/>
  <circle cx="88" cy="28" r="3" fill="#60a5fa" opacity="0.6"/>
</svg>
